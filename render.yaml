services:
  - type: web
    name: homeslice
    runtime: docker
    plan: free
    region: virginia # colocated with the Neon database (AWS us-east-1)
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: JWT_EXPIRES_IN
        value: "604800"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # paste the Neon connection string in the Render dashboard
